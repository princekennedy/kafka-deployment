services:
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped

    ports:
      - "8080:8080"

    environment:
      # =========================
      # UI LOGIN (THIS IS WHAT YOU WANT)
      # =========================
      AUTH_TYPE: "LOGIN_FORM"

      SPRING_SECURITY_USER_NAME: ${KAFKA_UI_USER:-admin}
      SPRING_SECURITY_USER_PASSWORD: ${KAFKA_UI_PASSWORD:-admin123}

      # =========================
      # Kafka connection
      # =========================
      KAFKA_CLUSTERS_0_NAME: production
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${SERVER_PUBLIC_IP}:9092

      # If Kafka is PLAINTEXT (current safe setup)
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: PLAINTEXT

      # If later you enable SASL, switch to this:
      # KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_PLAINTEXT
      # KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      # KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: >
      #   org.apache.kafka.common.security.plain.PlainLoginModule required
      #   username="admin"
      #   password="admin123";
